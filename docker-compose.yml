services:
  postgres:
    image: postgres:16-alpine
    container_name: oakattest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: oakattest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - oakattest_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oakattest"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  oakattest_postgres_data:
